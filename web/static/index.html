<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 用量仪表盘</title>
<style>
html, body { width: 100%; min-height: 100%; }
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow-x: hidden;
  background: #f7f7f4;
  color: #17191c;
  font-family: Arial, "Microsoft YaHei", sans-serif;
  font-size: 18px;
  line-height: 1.35;
}
.dashboard { width: 100%; padding: 12px; }
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 58px;
  border-bottom: 3px solid #17191c;
}
.header h1 { margin: 0; font-size: 28px; flex: 1; }
.header-actions { display: flex; gap: 6px; flex-shrink: 0; }
button {
  min-height: 48px;
  min-width: 76px;
  padding: 8px 12px;
  border: 2px solid #17191c;
  border-radius: 4px;
  background: #ffffff;
  color: #17191c;
  font: inherit;
  font-weight: bold;
}
button:disabled { opacity: 0.5; }
.icon-btn {
  min-width: 0;
  width: 42px;
  height: 42px;
  min-height: 0;
  padding: 0;
  border: 2px solid #17191c;
  border-radius: 6px;
  background: #ffffff;
  color: #17191c;
  font-size: 20px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.icon-btn.small {
  width: 32px;
  height: 32px;
  font-size: 16px;
  border-radius: 4px;
}
.status-message {
  margin-top: 10px;
  padding: 8px 10px;
  border: 2px solid #17191c;
  background: #ffffff;
}
.status-message.ok { border-style: dashed; }
.status-message.error { border-width: 3px; }
.cards { width: 100%; margin-top: 10px; }
.card {
  width: 100%;
  margin-bottom: 10px;
  padding: 14px;
  border: 2px solid #17191c;
  border-radius: 7px;
  background: #ffffff;
}
.codex-card { background: #f4f0fb; }
.deepseek-card { background: #eef4ff; display: flex; flex-direction: column; }
.vpn-card { background: #fff7e8; display: flex; flex-direction: column; }
.card-heading { font-size: 19px; font-weight: bold; letter-spacing: .04em; }
.card-head-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.main-value { margin: 6px 0; font-size: 36px; font-weight: bold; }
.sub-value { margin: 5px 0; font-size: 24px; font-weight: bold; }
.money-line {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.money-line .main-value,
.money-line .sub-value { margin-right: 0; }
.currency-unit {
  color: #454b52;
  font-size: 18px;
  font-weight: normal;
  line-height: 1;
}
.data-label { font-size: 15px; color: #454b52; margin-top: 6px; }
.quota { padding: 10px 0; }
.quota-secondary { border-top: 2px solid #777; }
.quota-row, .data-row { overflow: hidden; }
.quota-row strong:last-child, .data-row strong:last-child { float: right; }
.bar {
  width: 100%;
  height: 18px;
  margin: 7px 0;
  border: 2px solid #17191c;
  background: #ffffff;
}
.bar-fill { width: 0; height: 100%; background: #17191c; }
.error { margin-top: 8px; font-weight: bold; }
.stale { font-weight: bold; margin-left: 8px; }
.debug-panel {
  white-space: pre-wrap;
  border: 2px solid #17191c;
  background: #ffffff;
  padding: 10px;
  font-size: 13px;
}
.secondary-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.secondary-card {
  display: flex;
  flex-direction: column;
}

/* DeepSeek left-right split */
.ds-split {
  display: flex;
  gap: 12px;
  margin-top: 6px;
  flex: 1;
}
.ds-left {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.ds-right {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.ds-right .data-row {
  margin: 3px 0;
}
.ds-right .data-row strong {
  float: right;
}

/* VPN two-column */
.vpn-row {
  display: flex;
  gap: 16px;
  flex: 1;
  align-items: center;
}
.vpn-col {
  flex: 1;
}
.vpn-col .label {
  font-size: 15px;
  color: #454b52;
}

@media screen and (orientation: landscape) and (min-width: 700px) {
  .dashboard { padding: 10px 14px; }
  .card { margin-bottom: 8px; padding: 12px; }
  .secondary-row {
    flex-direction: row;
    align-items: stretch;
  }
  .secondary-card {
    flex: 1;
  }
  .codex-card .quota { padding: 7px 0; }
  .main-value { font-size: 32px; }
}

@media screen and (max-height: 650px) {
  body { font-size: 16px; }
  .dashboard { padding-top: 7px; }
  .header { min-height: 50px; }
  .header h1 { font-size: 24px; }
  button { min-height: 42px; }
  .icon-btn { width: 36px; height: 36px; font-size: 18px; }
  .icon-btn.small { width: 28px; height: 28px; font-size: 14px; }
  .card { padding: 10px; margin-bottom: 7px; }
  .main-value { font-size: 30px; }
  .quota { padding: 6px 0; }
}
</style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>AI 用量仪表盘</h1>
    <div class="header-actions">
      <button class="icon-btn" type="button" onclick="enterFullscreen()" title="全屏">&#x26F6;</button>
      <button class="icon-btn" type="button" onclick="refreshAll()" title="刷新">&#x21BB;</button>
    </div>
  </div>

  <div id="status-message" class="status-message">正在读取数据…</div>
  <div id="fullscreen-help" class="status-message help" style="display:none;">
    当前浏览器不支持网页全屏，请通过 Kindle 浏览器菜单进入全屏或隐藏工具栏。
  </div>

  <div class="cards">
    <div class="card codex-card" id="codex-card">
      <div class="card-heading">CODEX <span id="codex-plan"></span><span class="stale" id="codex-stale" style="display:none;">数据过期</span></div>
      <div id="codex-available">
        <div class="quota">
          <div class="quota-row">
            <strong>5 小时额度</strong>
            <strong id="codex-primary-pct">--</strong>
          </div>
          <div class="bar"><div class="bar-fill" id="codex-primary-bar"></div></div>
          <div class="meta" id="codex-primary-reset">重置时间 --</div>
        </div>
        <div class="quota quota-secondary">
          <div class="quota-row">
            <strong>7 天额度</strong>
            <strong id="codex-secondary-pct">--</strong>
          </div>
          <div class="bar"><div class="bar-fill" id="codex-secondary-bar"></div></div>
          <div class="meta" id="codex-secondary-reset">重置时间 --</div>
        </div>
      </div>
      <div id="codex-unavailable" class="error" style="display:none;">暂无 Codex 数据</div>
    </div>

    <div class="secondary-row">
      <div class="card secondary-card deepseek-card" id="deepseek-card">
        <div class="card-head-row">
          <span class="card-heading">DEEPSEEK</span>
          <button class="icon-btn small" type="button" id="btn-usage" onclick="refreshUsage()" title="刷新本月用量">&#x21BB;</button>
        </div>
        <div class="ds-split">
          <div class="ds-left">
            <div class="data-label">充值余额</div>
            <div class="money-line">
              <div class="main-value" id="ds-balance">--</div>
              <span class="currency-unit" id="ds-balance-currency">CNY</span>
            </div>
            <div class="data-label" id="ds-cost-label">当月消费</div>
            <div class="money-line">
              <div class="sub-value" id="ds-monthly-cost">--</div>
              <span class="currency-unit" id="ds-monthly-currency">CNY</span>
            </div>
          </div>
          <div class="ds-right">
            <div class="data-label">Token 用量</div>
            <div class="sub-value" id="ds-monthly-tokens">--</div>
            <div class="data-row">
              <span>请求</span>
              <strong id="ds-monthly-requests">--</strong>
            </div>
            <div class="meta" id="ds-monthly-updated">--</div>
          </div>
        </div>
        <div id="ds-login-hint" class="error" style="display:none; margin-top:4px;">
          请先在主机 Chrome 登录 DeepSeek
        </div>
      </div>

      <div class="card secondary-card vpn-card" id="vpn-card">
        <div class="card-heading">网络流量</div>
        <div class="card-body">
          <div class="vpn-row">
            <div class="vpn-col">
              <div class="main-value" id="vpn-remaining">-- GB</div>
              <div class="label">剩余流量</div>
            </div>
            <div class="vpn-col">
              <div class="sub-value" id="vpn-used">-- GB</div>
              <div class="label">已用流量</div>
            </div>
          </div>
          <div class="meta" style="margin-top:8px;">到期 <span id="vpn-expiry">--</span></div>
        </div>
      </div>
    </div>
  </div>

  <pre id="debug-panel" class="debug-panel" style="display:none;"></pre>
</div>

<script>
var pollTimer = null;

function requestJSON(method, url, body, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, url, true);
  xhr.timeout = 15000;
  xhr.setRequestHeader('Accept', 'application/json');
  if (body !== null) {
    xhr.setRequestHeader('Content-Type', 'application/json');
  }
  xhr.onreadystatechange = function () {
    var data;
    if (xhr.readyState !== 4) {
      return;
    }
    if (xhr.status < 200 || xhr.status >= 300) {
      callback(new Error('HTTP ' + xhr.status), null);
      return;
    }
    try {
      data = JSON.parse(xhr.responseText);
    } catch (error) {
      callback(new Error('数据格式错误'), null);
      return;
    }
    callback(null, data);
  };
  xhr.onerror = function () {
    callback(new Error('无法连接服务'), null);
  };
  xhr.ontimeout = function () {
    callback(new Error('请求超时'), null);
  };
  xhr.send(body === null ? null : JSON.stringify(body));
}

function byId(id) {
  return document.getElementById(id);
}

function setText(id, value) {
  var element = byId(id);
  if (element) {
    element.innerHTML = '';
    element.appendChild(document.createTextNode(String(value)));
  }
}

function setStatus(message, kind) {
  var element = byId('status-message');
  element.className = 'status-message ' + (kind || '');
  setText('status-message', message);
}

function asNumber(value, fallback) {
  var number = Number(value);
  return isFinite(number) ? number : fallback;
}

function formatTokens(value) {
  var number = asNumber(value, 0);
  if (number >= 1000000) {
    return (number / 1000000).toFixed(1) + 'M';
  }
  if (number >= 1000) {
    return Math.round(number / 1000) + 'K';
  }
  return number ? String(number) : '--';
}

function formatNumber(value) {
  var number = asNumber(value, 0);
  return number.toLocaleString ? number.toLocaleString() : String(number);
}

function setBar(id, percent) {
  var safePercent = Math.max(0, Math.min(100, asNumber(percent, 0)));
  byId(id).style.width = safePercent + '%';
}

// ── data loading ──

function fetchDashboard() {
  setStatus('正在读取数据…', '');
  requestJSON('GET', '/api/dashboard', null, function (error, data) {
    if (error) {
      setStatus('读取失败：' + error.message, 'error');
      return;
    }
    renderCodex(data && data.codex);
    renderDeepSeek(data && data.deepseek);
    renderVPN(data && data.vpn);

    if (data && data.lastUpdated) {
      setStatus(data.lastUpdated + ' 数据已更新', 'ok');
    } else {
      setStatus('数据已更新', 'ok');
    }
  });
}

function renderCodex(data) {
  var primary;
  var secondary;
  var primaryPercent;
  var secondaryPercent;
  if (!data || !data.available) {
    byId('codex-available').style.display = 'none';
    byId('codex-unavailable').style.display = 'block';
    setText('codex-plan', '');
    byId('codex-stale').style.display = 'none';
    return;
  }
  byId('codex-available').style.display = 'block';
  byId('codex-unavailable').style.display = 'none';
  setText('codex-plan', data.planType ? '(' + data.planType + ')' : '');
  byId('codex-stale').style.display = data.stale ? 'inline' : 'none';
  primary = data.primary || {};
  secondary = data.secondary || {};
  primaryPercent = asNumber(primary.remainingPercent, 0);
  secondaryPercent = asNumber(secondary.remainingPercent, 0);
  setText('codex-primary-pct', primaryPercent + '% 剩余');
  setText('codex-secondary-pct', secondaryPercent + '% 剩余');
  setText('codex-primary-reset', '重置时间 ' + (primary.resetTime || '--'));
  setText('codex-secondary-reset', '重置时间 ' + (secondary.resetTime || '--'));
  setBar('codex-primary-bar', primaryPercent);
  setBar('codex-secondary-bar', secondaryPercent);
}

function renderDeepSeek(data) {
  var balance, cost, currency, hasUsage, monthLabel, monthTs;

  if (!data) {
    setText('ds-balance', '暂无数据');
    return;
  }
  balance = asNumber(data.balance, 0);
  cost = asNumber(data.monthlyCost, 0);
  currency = data.currency || 'CNY';
  hasUsage = asNumber(data.monthlyTokens, 0) > 0;

  // 从月度更新时间提取月份
  monthTs = data.monthlyUpdated || '';
  if (monthTs) {
    var m = monthTs.match(/(\d{4})-(\d{2})/);
    monthLabel = m ? (parseInt(m[2], 10) + '月消费') : '当月消费';
  } else {
    monthLabel = '当月消费';
  }

  setText('ds-balance', '￥' + balance.toFixed(2));
  setText('ds-balance-currency', currency);
  setText('ds-cost-label', monthLabel);
  setText('ds-monthly-cost', '￥' + cost.toFixed(2));
  setText('ds-monthly-currency', currency);
  setText('ds-monthly-tokens', formatTokens(data.monthlyTokens));
  setText('ds-monthly-requests', formatNumber(data.monthlyRequests) + ' 次');
  setText(
    'ds-monthly-updated',
    data.monthlyUpdated ? '更新于：' + data.monthlyUpdated : '尚未获取'
  );
  byId('ds-login-hint').style.display = hasUsage ? 'none' : 'block';
}

function renderVPN(data) {
  var used, remaining;
  if (!data) {
    setText('vpn-remaining', '暂无数据');
    return;
  }
  used = asNumber(data.usedBandwidth, 0);
  remaining = asNumber(data.remainingBandwidth, 0);
  setText('vpn-remaining', remaining.toFixed(1) + ' ' + (data.unit || 'GB'));
  setText('vpn-used', used.toFixed(1) + ' ' + (data.unit || 'GB'));
  setText('vpn-expiry', data.expiryDate || '--');
}

// ── actions ──

function refreshAll() {
  fetchDashboard();
}

function refreshUsage() {
  var button = byId('btn-usage');
  button.disabled = true;
  requestJSON('POST', '/api/collect/usage', {}, function (error, data) {
    button.disabled = false;
    if (error || !data || data.status !== 'ok') {
      setStatus(
        '用量刷新失败：' + (error ? error.message : data.message || '未知错误'),
        'error'
      );
      return;
    }
    fetchDashboard();
  });
}

function openLogin() {
  requestJSON('POST', '/api/collect/usage/login', {}, function (error, data) {
    if (error || !data || data.status !== 'ok') {
      setStatus(
        '打开登录失败：' + (error ? error.message : data.message || '未知错误'),
        'error'
      );
      return;
    }
    setStatus('请在主机 Chrome 完成 DeepSeek 登录，然后刷新用量', 'ok');
  });
}

// ── fullscreen ──

function enterFullscreen() {
  var root = document.documentElement;
  var request = root.requestFullscreen ||
    root.webkitRequestFullscreen ||
    root.mozRequestFullScreen ||
    root.msRequestFullscreen;
  if (request) {
    try {
      request.call(root);
      return;
    } catch (error) {
      byId('fullscreen-help').style.display = 'block';
      return;
    }
  }
  byId('fullscreen-help').style.display = 'block';
}

// ── debug ──

function showDebugIfRequested() {
  var query = window.location.search || '';
  var debugPanel;
  var lines;
  if (query.indexOf('debug=1') === -1) {
    return;
  }
  debugPanel = byId('debug-panel');
  lines = [
    'screen.width=' + screen.width,
    'screen.height=' + screen.height,
    'window.innerWidth=' + window.innerWidth,
    'window.innerHeight=' + window.innerHeight,
    'clientWidth=' + document.documentElement.clientWidth,
    'clientHeight=' + document.documentElement.clientHeight,
    'devicePixelRatio=' + (window.devicePixelRatio || 1),
    'userAgent=' + navigator.userAgent
  ];
  debugPanel.style.display = 'block';
  setText('debug-panel', lines.join('\n'));
}

// ── init ──

function initializeDashboard() {
  showDebugIfRequested();
  fetchDashboard();
  pollTimer = window.setInterval(fetchDashboard, 60000);
}

if (window.addEventListener) {
  window.addEventListener('load', initializeDashboard, false);
} else {
  window.attachEvent('onload', initializeDashboard);
}
</script>
</body>
</html>
